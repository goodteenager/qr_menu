<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>QR-меню ресторана</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="table-tag" id="tableTag">Столик №?</div>
        <div class="title-block">
          <h1>Меню</h1>
          <p>Выберите блюда и оформите заказ</p>
        </div>
      </header>

      <main class="app-main">
        <nav class="categories" id="categories"></nav>
        <section class="menu" id="menu"></section>
      </main>

      <footer class="app-footer">
        <div class="cart-info">
          <span id="cartSummary">Корзина пуста</span>
          <span id="cartTotal" class="cart-total">0 ₽</span>
        </div>
        <button id="orderButton" class="order-button" disabled>
          Заказать
        </button>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
